<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family:'Inter'; font-weight:500; src:url('../09-brochure/fonts/inter-500.woff2') format('woff2'); }
@font-face { font-family:'Inter'; font-weight:800; src:url('../09-brochure/fonts/inter-800.woff2') format('woff2'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: transparent;
  display: inline-block;
  font-family: 'Inter', sans-serif;
}

.logo {
  display: inline-flex;
  align-items: stretch;
  gap: 12px;
}

.logo-symbol {
  width: 200px;
  height: 200px;
  object-fit: contain;
  display: block;
  flex: 0 0 200px;
  align-self: center;
}

/* Right column: wordmark + rule + tagline — all left-aligned together */
.logo-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo-wordmark {
  font-size: 200px;
  font-weight: 800;
  line-height: 0.82;
  letter-spacing: -6px;
  white-space: nowrap;
  position: relative;
  z-index: 2;
}

.l-a1 { color: #E8A141; }
.l-a2 { color: #C94A35; }
.l-y  { color: #9A8030; }
.l-i  { color: #D99659; }

.logo-rule {
  width: 100%;
  height: 5px;
  background: #C94A35;
  border-radius: 3px;
  margin-top: -24px;
  position: relative;
  z-index: 1;
}

.logo-tagline {
  font-weight: 500;
  white-space: nowrap;
  margin-top: 4px;
  letter-spacing: 0.01em;
  position: relative;
  z-index: 2;
}
</style>
</head>
<body>
<div class="logo">
  <img class="logo-symbol" src="../01-logo-transparent/aayi-logo-symbol-transparent-approved-artwork-1024x1024.png" alt="aayi">
  <div class="logo-text">
    <div class="logo-wordmark" id="wordmark">
      <span class="l-a1">a</span><span class="l-a2">a</span><span class="l-y">y</span><span class="l-i">i</span>
    </div>
    <div class="logo-tagline" id="tagline" style="display:flex;align-items:baseline;">
      <span id="tl-left" style="white-space:nowrap;"><span style="color:#E8A141">Your</span> <span style="color:#C94A35">AI</span> <span style="color:#9A8030">companion</span> <span style="color:#D99659">for</span> <span style="color:#C94A35">pregnancy</span></span>
      <span id="tl-gap" style="display:inline-block;"></span>
      <span id="tl-right" style="white-space:nowrap;"><span style="color:#9A8030">&amp;</span> <span style="color:#E8A141">motherhood</span></span>
    </div>
  </div>
</div>
<script>
  const tagline = document.getElementById('tagline');
  const wordmark = document.getElementById('wordmark');
  const ySpan = document.querySelector('.l-y');
  const wordmarkRect = wordmark.getBoundingClientRect();
  const yRect = ySpan.getBoundingClientRect();

  // Gap = "y" span width (descender occupies this column)
  const gapLeft = yRect.left - wordmarkRect.left;
  const gapWidth = yRect.width;

  // Auto-fit font size so left+gap+right fills wordmark width
  const target = wordmark.offsetWidth;
  let size = 40;
  tagline.style.fontSize = size + 'px';
  document.getElementById('tl-gap').style.width = gapWidth + 'px';

  function totalWidth() {
    return document.getElementById('tl-left').offsetWidth +
           gapWidth +
           document.getElementById('tl-right').offsetWidth;
  }

  while (totalWidth() < target - 1 && size < 300) {
    size += 0.5;
    tagline.style.fontSize = size + 'px';
  }
  while (totalWidth() > target && size > 4) {
    size -= 0.5;
    tagline.style.fontSize = size + 'px';
  }
</script>
</body>
</html>

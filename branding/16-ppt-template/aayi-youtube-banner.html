<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#E8A141;--coral:#C94A35;--olive:#9A8030;--gold:#D99659;--dark:#2B1810;--muted:#7A5C48}
html,body{width:1280px;height:720px;overflow:hidden;font-family:-apple-system,'Segoe UI',Arial,sans-serif}
.canvas{width:1280px;height:720px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#F0E4D0 0%,#F8F0E0 40%,#F5EADB 70%,#EAD9C2 100%)}

/* Background blobs — TV decorative */
.blob{position:absolute;border-radius:50%;pointer-events:none}
.b1{width:520px;height:400px;top:-160px;left:-100px;background:radial-gradient(ellipse,rgba(154,128,48,.2) 0%,transparent 65%)}
.b2{width:440px;height:360px;top:-140px;right:-80px;background:radial-gradient(ellipse,rgba(201,74,53,.15) 0%,transparent 65%)}
.b3{width:420px;height:340px;bottom:-140px;left:-80px;background:radial-gradient(ellipse,rgba(217,150,89,.18) 0%,transparent 65%)}
.b4{width:480px;height:380px;bottom:-160px;right:-100px;background:radial-gradient(ellipse,rgba(232,161,65,.16) 0%,transparent 65%)}

/* Full desktop band y=254–465 */
.band{position:absolute;top:254px;left:0;right:0;height:211px;
  display:flex;align-items:center}

/* LEFT desktop zone (x=0–253) */
.left-zone{width:253px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:9px;padding:0 18px 0 24px}
.pill{background:rgba(255,255,255,.82);border:1.5px solid rgba(43,24,16,.1);border-radius:100px;
  padding:8px 14px;display:flex;align-items:center;gap:7px;
  box-shadow:0 2px 10px rgba(43,24,16,.09);width:100%}
.pill-icon{font-size:14px;line-height:1;flex-shrink:0}
.pill-text{font-size:11px;font-weight:700;color:var(--dark);white-space:nowrap}

/* CENTER all-devices zone (x=253–1026 = 773px) */
.center-zone{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;padding:0 24px}
.logo-wrap{width:340px}
.logo-wrap img{width:100%;height:auto;display:block}
.tagline{font-size:15px;font-weight:700;color:var(--dark);letter-spacing:.01em;
  text-align:center;white-space:nowrap}
.tagline .pr{color:var(--coral)}
.tagline .mo{color:var(--olive)}
.center-pills{display:flex;gap:8px}
.cpill{background:rgba(255,255,255,.75);border:1.5px solid rgba(43,24,16,.09);border-radius:100px;
  padding:6px 12px;font-size:10.5px;font-weight:700;color:var(--dark);white-space:nowrap;
  box-shadow:0 2px 8px rgba(43,24,16,.07)}

/* RIGHT desktop zone (x=1026–1280 = 254px) */
.right-zone{width:254px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:9px;padding:0 24px 0 18px}
.ch-url{font-size:12.5px;font-weight:800;color:var(--dark);letter-spacing:.02em;
  text-align:center;white-space:nowrap}
.ch-url span{color:var(--coral)}
.ch-badge{background:rgba(43,24,16,.07);border:1.5px solid rgba(43,24,16,.1);border-radius:100px;
  padding:6px 14px;font-size:10.5px;font-weight:700;color:var(--dark);white-space:nowrap}
.ch-note{font-size:10px;color:var(--muted);font-weight:600;text-align:center;line-height:1.7}
.ch-note span{color:var(--amber)}
</style>
</head>
<body>

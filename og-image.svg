<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A1008"/>
      <stop offset="60%"  stop-color="#4A1E14"/>
      <stop offset="100%" stop-color="#3D1810"/>
    </linearGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E86B52"/>
      <stop offset="100%" stop-color="#F0A030"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E86B52" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E86B52" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Coral accent bar -->
  <rect x="80" y="80" width="4" height="470" rx="2" fill="url(#coral)"/>

  <!-- Logo wordmark -->
  <text x="110" y="180" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="900" fill="white" letter-spacing="-3">aayi</text>
  <text x="390" y="180" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="900" fill="#E86B52" letter-spacing="-3">.</text>
  <text x="416" y="180" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="96" font-weight="900" fill="white" letter-spacing="-3">ai</text>

  <!-- Tagline -->
  <text x="110" y="240" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    Maternal &amp; Child Digital Ecosystem
  </text>

  <!-- Divider -->
  <line x1="110" y1="270" x2="540" y2="270" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="110" y="330" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" fill="white" letter-spacing="-0.5">
    Bridging the gap between a
  </text>
  <text x="110" y="376" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="900" fill="#F08070" letter-spacing="-0.5">
    15-minute consultation
  </text>
  <text x="110" y="422" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="800" fill="white" letter-spacing="-0.5">
    and 30 days of patient choices.
  </text>

  <!-- Stats row -->
  <rect x="110" y="470" width="130" height="70" rx="12" fill="rgba(232,107,82,0.15)" stroke="rgba(232,107,82,0.3)" stroke-width="1"/>
  <text x="175" y="498" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="900" fill="#F08070" text-anchor="middle">40%</text>
  <text x="175" y="522" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Admin saved</text>

  <rect x="258" y="470" width="130" height="70" rx="12" fill="rgba(232,107,82,0.15)" stroke="rgba(232,107,82,0.3)" stroke-width="1"/>
  <text x="323" y="498" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="900" fill="#F08070" text-anchor="middle">24/7</text>
  <text x="323" y="522" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Patient support</text>

  <rect x="406" y="470" width="130" height="70" rx="12" fill="rgba(232,107,82,0.15)" stroke="rgba(232,107,82,0.3)" stroke-width="1"/>
  <text x="471" y="498" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="900" fill="#F08070" text-anchor="middle">0</text>
  <text x="471" y="522" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Midnight calls</text>

  <!-- Right panel: phone mockup suggestion -->
  <rect x="760" y="60" width="360" height="510" rx="40" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="860" y="80" width="160" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Mock cards in phone -->
  <rect x="790" y="110" width="300" height="70" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="135" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700" fill="#E86B52" letter-spacing="1">TODAY'S COMPLIANCE</text>
  <text x="810" y="158" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="white">Day 14 · Week 2</text>
  <rect x="810" y="168" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="810" y="168" width="146" height="3" rx="1.5" fill="url(#coral)"/>

  <rect x="790" y="196" width="300" height="70" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="218" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700" fill="#E86B52" letter-spacing="1">AI SAHELI</text>
  <text x="810" y="238" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.75)">"Is back pain normal at 14 weeks?"</text>
  <text x="810" y="256" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="500" fill="#F08070">✓ Evidence-based answer sent</text>

  <rect x="790" y="282" width="300" height="70" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="304" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700" fill="#E86B52" letter-spacing="1">DOCTOR ALERT</text>
  <text x="810" y="326" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="800" fill="white">Trend: BP ↑</text>
  <text x="810" y="344" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">3 readings flagged this week</text>

  <rect x="790" y="368" width="300" height="70" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="810" y="390" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700" fill="#E86B52" letter-spacing="1">NEXT VACCINE</text>
  <text x="810" y="414" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#F08070">July 8 · DPT Booster</text>
  <text x="810" y="432" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Reminder sent to parents</text>

  <!-- Website URL -->
  <text x="110" y="600" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1">
    aayi.ai
  </text>
</svg>
